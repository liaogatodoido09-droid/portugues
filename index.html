<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Português Fácil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 Português Fácil</h1>
    <p>Aprenda português de forma simples e gratuita.</p>
</header>

<div class="container">

    <div class="card">
        <h2 id="pergunta"></h2>

        <div id="alternativas"></div>

        <button id="proxima" style="display:none;">
            Próxima Pergunta
        </button>
    </div>

    <div class="placar">
        <h3>🏆 Sua Pontuação</h3>
        <p id="score">0 pontos</p>

        <progress id="barra" value="0" max="100"></progress>
    </div>

</div>

<footer>
    <p>© 2026 Português Fácil - Todos os direitos reservados.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
